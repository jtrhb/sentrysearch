app = "sentrysearch-pg"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.postgres"

[env]
  POSTGRES_USER = "sentrysearch"
  POSTGRES_DB = "sentrysearch"
  PGDATA = "/data/pgdata"

[mounts]
  source = "pg_data"
  destination = "/data"

[[services]]
  internal_port = 5432
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 5432

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
